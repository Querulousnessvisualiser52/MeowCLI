version: "2"

sql:
  - engine: "postgresql"
    schema: "db/postgres/schema"
    queries: "db/postgres/queries"
    gen:
      go:
        package: "postgres"
        out: "internal/db/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"

  - engine: "sqlite"
    schema: "db/sqlite/schema.sql"
    queries: "db/sqlite/queries"
    gen:
      go:
        package: "sqlite"
        out: "internal/db/sqlite"
        emit_json_tags: true
        emit_empty_slices: true
